<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>BC-Scoreboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="scoreboard" class="hidden">


<div class="header">

<img id="logo" src="logo.png">


<div>

<h1 id="title">
BCGAMING Roleplay
</h1>


<p id="players">
Players Online: 0
</p>

</div>


</div>




<div class="departments">


<div class="card">

🚓 Police

<span id="police">
0
</span>

</div>



<div class="card">

🚑 EMS

<span id="ems">
0
</span>

</div>



<div class="card">

🔥 Fire

<span id="fire">
0
</span>

</div>


</div>





<input 
id="searchPlayers"
placeholder="Search Players..."
>



<table>


<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Job</th>

<th>Staff</th>

<th>Ping</th>

</tr>

</thead>


<tbody id="playerTable">

</tbody>


</table>



</div>


<script src="script.js"></script>

</body>

</html>
